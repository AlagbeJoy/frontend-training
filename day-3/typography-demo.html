<!DOCTYPE html>
<html>
    <head>
        <title>Typography Demo</title>
    </head>
    <body>
        <h1 style="font-family: Arial; color: #333; text-align: center;">
            Welcome to My Restaurant
        </h1>

        <p style="font-family: 'Times New Roman'; font-size: 18px; line-height: 1,6; color: #555;">
            This is the main description of our restaurant. We serve delicious food
            made with fresh ingredients. The font is easy to read with comfortable
            line spacing.
        </p>

        <h2 style="font-family: Verdana; color: #FF6600; text-decoration: underline;">
            Today's Specials
        </h2>

        <p style="font-weight: bold; text-align: center; font-size: 20px;">
            Grilled Salmon - $18.99
        </p>

        <p style="font-style: italic; text-align: right;">
            *Add a glass of wine for $6
        </p>
    </body>
</html>
