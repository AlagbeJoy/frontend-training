<!DOCTYPE html>
<html>
    <head>
        <title>CSS Colors Demo</title>
    </head>
    <body>
        <h1 style="color: #FF6600;">Welcome to CSS Colors!</h1>

        <p style="color: blue;">This is blue using named color.</p>
        <p style="color: #FF0000;">This is red using hex code.</p>
        <p style="color: rgb(0, 128, 0);">This is green using RGB.</p>

        <p style="color: purple; background-color: #FFFFCC;">
            This text is purple on a light yellow background.
        </p>

        <h2 style="color: white; background-color: #333333;">
            Dark header with white text
        </h2>
    </body>
</html>
