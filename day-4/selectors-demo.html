<!doctype html>
<html>
  <head>
    <title>CSS Selectors Demo</title>
    <style>
      h1 {
        color: #ff6600;
        text-align: center;
      }

      .warning {
        background-color: #ffeecc;
        border-left: 5px solid #ff6600;
        padding: 15px;
        margin: 20px 0;
      }

      #main-title {
        font-size: 48px;
        text-transform: uppercase;
      }

      .menu-list li {
        padding: 8px;
        border-bottom: 1px dotted #ccc;
      }

      h2,
      h3 {
        color: #333;
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <h1 id="main-title">CSS Selectors Demo</h1>
    <div class="warning">
      <strong>Note:</strong> Class selectors can be used multiple times.
    </div>

    <h2>Today's Menu</h2>
    <ul class="menu-list">
      <li>Jollof Rice - $4.50</li>
      <li>Butter Chicken - $4.90</li>
      <li>Greek Gyro - $4.60</li>
    </ul>

    <div class="warning">
      <strong>Special:</strong> Buy any main course, get a free drink!
    </div>

    <h3>Contact Us</h3>
    <p>Email: natesrestaurant@gmail.com</p>
  </body>
</html>
