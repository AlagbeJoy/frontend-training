<!doctype html>
<html>
  <head>
    <title>Internal CSS Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f5f5f5;
      }

      h1 {
        color: #ff6600;
        text-align: center;
      }

      p {
        line-height: 1.6;
        color: #333;
      }

      .special-box {
        background-color: white;
        border: 2px solid #ff6600;
        border-radius: 10px;
        padding: 20px;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to Internal CSS</h1>
    <p>This paragraph is styled by the p selector.</p>

    <div class="special-box">
      <p>This box uses the "special-box" class.</p>
      <p>All CSS is inside the &lt;style&gt; tag in the head.</p>
    </div>

    <div class="special-box">
      <p>Another box with the same class!</p>
      <p>One class, many elements.</p>
    </div>
  </body>
</html>
